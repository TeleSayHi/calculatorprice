<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>เปรียบเทียบความคุ้มสินค้า | Mobile Optimized</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    :root {
        --bg-color: #0f172a;
        --card-bg: #1e293b;
        --primary: #0ea5e9;
        --primary-glow: rgba(14, 165, 233, 0.5);
        --secondary: #8b5cf6;
        --success: #10b981;
        --danger: #ef4444;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; }

    body {
        background-color: var(--bg-color);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* ปรับ Padding ของ Body ให้เหมาะกับมือถือ */
        padding: 20px 10px; 
        background-image: 
            radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
        background-attachment: fixed;
    }

    .app-container {
        width: 100%;
        max-width: 900px;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        /* ปรับ Padding กล่องหลัก */
        padding: 30px 20px; 
        box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.5);
    }

    .header { text-align: center; margin-bottom: 25px; }
    .header h2 {
        font-size: 24px; /* ลดขนาดฟอนต์หัวข้อเล็กน้อย */
        font-weight: 700;
        background: linear-gradient(to right, var(--primary), var(--secondary));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header p { color: var(--text-muted); font-size: 13px; margin-top: 5px; }

    .setup-section {
        display: flex; gap: 10px; margin-bottom: 25px;
        background: rgba(0,0,0,0.2); padding: 15px; border-radius: 16px;
        /* เรียงต่อกันเป็นแนวตั้งเมื่อจอมือถือเล็ก */
        flex-direction: column; 
    }

    .input-group { position: relative; width: 100%; display: flex; align-items: center; margin-bottom: 12px;}
    .item-card .input-group:last-child { margin-bottom: 0; }
    
    .input-group i.icon-left {
        position: absolute; left: 15px; color: var(--text-muted); z-index: 2;
    }

    input, select {
        width: 100%;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255,255,255,0.1);
        color: white;
        padding: 12px 12px 12px 42px; /* ปรับ padding ให้สมดุล */
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        transition: all 0.3s ease;
    }

    select { padding-left: 10px; width: 35%; border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0; cursor: pointer; text-align: center; }
    input.with-select { border-top-right-radius: 0; border-bottom-right-radius: 0; width: 65%; }
    
    input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }

    button {
        cursor: pointer; border: none; padding: 12px 20px; border-radius: 12px;
        font-weight: 600; font-size: 16px; color: white; transition: all 0.3s;
        display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
    }

    .btn-create { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }
    .btn-create:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

    .btn-scan {
        background: var(--secondary); padding: 0 15px; height: 100%; position: absolute; right: 0;
        border-top-left-radius: 0; border-bottom-left-radius: 0; width: auto;
    }
    .btn-scan:hover { background: #7c3aed; }

    .btn-calc {
        width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary));
        padding: 16px; font-size: 18px; margin-top: 20px; display: none;
    }
    .btn-calc:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 8px 25px var(--primary-glow); }

    /* ปรับ Grid ให้เป็น 1 คอลัมน์สำหรับมือถือเสมอ */
    #inputs { display: grid; grid-template-columns: 1fr; gap: 15px; }

    @media (min-width: 600px) {
        /* ถ้าเป็นจอคอม/แท็บเล็ต ให้กลับไปใช้หลายคอลัมน์ได้ */
        #inputs { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .setup-section { flex-direction: row; }
        .btn-create { width: auto; flex: 1; }
    }

    .item-card {
        background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px; padding: 15px; animation: scaleIn 0.4s forwards;
    }

    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    .item-card h3 { font-size: 16px; color: var(--primary); margin-bottom: 12px; }

    /* Scanner Modal */
    #scanner-modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; padding: 20px;
    }
    #reader { width: 100%; max-width: 400px; background: white; border-radius: 16px; overflow: hidden; }
    .close-scanner { margin-top: 20px; background: var(--danger); width: auto; padding: 12px 30px; }

    /* Results */
    .result-container { margin-top: 25px; }
    .result-item {
        background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 15px; margin-bottom: 12px;
        display: flex; flex-direction: column; gap: 8px; border: 1px solid rgba(255,255,255,0.05);
        animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* ปรับ Header ผลลัพธ์ให้ไม่ซ้อนกันเวลามือถือจอแคบ */
    .result-header { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; font-weight: 500; }
    @media (min-width: 480px) {
        .result-header { flex-direction: row; justify-content: space-between; align-items: center; gap: 0; }
    }
    
    .best-badge { background: rgba(16, 185, 129, 0.2); color: var(--success); padding: 4px 10px; border-radius: 20px; font-size: 12px; display: inline-block;}
    .progress-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 4px;}
    .progress-bar { height: 100%; border-radius: 10px; transition: width 1s; }
    .progress-success { background: var(--success); box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
    .progress-danger { background: var(--danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }

</style>
</head>

<body>

<div class="app-container">
    <div class="header">
        <h2><i class="fa-solid fa-scale-balanced"></i> เปรียบเทียบความคุ้มค่า</h2>
        <p>สแกนบาร์โค้ด • คำนวณข้ามหน่วย • รู้ผลทันที</p>
    </div>

    <div class="setup-section">
        <div class="input-group" style="margin: 0; width: 100%;">
            <i class="fa-solid fa-boxes-stacked icon-left"></i>
            <input type="number" id="count" placeholder="จำนวนสินค้า (เช่น 2, 3)" min="2" style="width: 100%;">
        </div>
        <button class="btn-create" onclick="createInputs()">
            <i class="fa-solid fa-wand-magic-sparkles"></i> สร้างช่อง
        </button>
    </div>

    <div id="inputs"></div>

    <button id="calcBtn" class="btn-calc" onclick="calculate()">
        <i class="fa-solid fa-calculator"></i> คำนวณความคุ้มค่า
    </button>

    <div id="result" class="result-container"></div>
</div>

<div id="scanner-modal">
    <h3 style="color: white; margin-bottom: 20px; text-align: center;">สแกนบาร์โค้ดสินค้า</h3>
    <div id="reader"></div>
    <button class="close-scanner" onclick="stopScanner()">ปิดกล้อง</button>
</div>

<script>
let html5QrcodeScanner = null;
let currentScanTarget = null;

function playSuccessSound() {
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime); 
    osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1); 
    
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
    
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
}

function createInputs() {
    let count = document.getElementById("count").value;
    let area = document.getElementById("inputs");
    let calcBtn = document.getElementById("calcBtn");
    let resultArea = document.getElementById("result");
    
    if(!count || count < 2) {
        alert("กรุณากรอกจำนวนสินค้าอย่างน้อย 2 ชิ้นครับ");
        return;
    }

    area.innerHTML = "";
    resultArea.innerHTML = "";
    
    for(let i = 1; i <= count; i++) {
        area.innerHTML += `
        <div class="item-card" style="animation-delay: ${i * 0.05}s">
            <h3><i class="fa-solid fa-box"></i> สินค้าที่ ${i}</h3>
            
            <div class="input-group">
                <i class="fa-solid fa-font icon-left"></i>
                <input type="text" id="name${i}" placeholder="ชื่อแบรนด์/รุ่น (ถ้ามี)">
                <button class="btn-scan" onclick="startScanner(${i})" title="สแกนบาร์โค้ด">
                    <i class="fa-solid fa-barcode"></i>
                </button>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-tag icon-left"></i>
                <input type="number" id="price${i}" placeholder="ราคา (บาท)">
            </div>

            <div class="input-group">
                <i class="fa-solid fa-weight-scale icon-left"></i>
                <input type="number" id="amount${i}" class="with-select" placeholder="ปริมาณ">
                <select id="unit${i}">
                    <option value="1">กรัม (g)</option>
                    <option value="1">มล. (ml)</option>
                    <option value="1000">กิโล (kg)</option>
                    <option value="1000">ลิตร (L)</option>
                    <option value="1">ชิ้น</option>
                </select>
            </div>
        </div>
        `;
    }
    
    calcBtn.style.display = "flex";
    calcBtn.style.animation = "fadeIn 0.5s ease forwards";
}

function startScanner(index) {
    currentScanTarget = index;
    document.getElementById('scanner-modal').style.display = 'flex';
    
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 150} }, false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
}

function onScanSuccess(decodedText, decodedResult) {
    document.getElementById(`name${currentScanTarget}`).value = `บาร์โค้ด: ${decodedText}`;
    stopScanner();
    playSuccessSound(); 
}

function onScanFailure(error) { }

function stopScanner() {
    if (html5QrcodeScanner) {
        html5QrcodeScanner.clear();
    }
    document.getElementById('scanner-modal').style.display = 'none';
}

function calculate() {
    let count = document.getElementById("count").value;
    let unitPrices = [];
    let isValid = true;
    let results = [];
    
    for(let i = 1; i <= count; i++) {
        let name = document.getElementById("name"+i).value || `สินค้า ${i}`;
        let price = parseFloat(document.getElementById("price"+i).value);
        let amountInput = parseFloat(document.getElementById("amount"+i).value);
        let unitMultiplier = parseFloat(document.getElementById("unit"+i).value);
        
        if(isNaN(price) || isNaN(amountInput) || amountInput === 0) {
            isValid = false;
        }
        
        let totalBaseAmount = amountInput * unitMultiplier;
        let pricePerBaseUnit = price / totalBaseAmount;
        
        unitPrices.push(pricePerBaseUnit);
        results.push({ id: i, name: name, unitPrice: pricePerBaseUnit });
    }

    if(!isValid) {
        alert("กรุณากรอกราคาและปริมาณให้ครบทุกช่อง และปริมาณห้ามเป็น 0 ครับ");
        return;
    }
    
    playSuccessSound(); 

    let minPrice = Math.min(...unitPrices);
    let resultHTML = "<div style='margin-bottom:15px; font-weight:600; color:var(--text-muted);'>🏆 สรุปผลความคุ้มค่า:</div>";
    
    results.forEach(item => {
        item.percent = ((item.unitPrice - minPrice) / minPrice) * 100;
    });

    results.sort((a, b) => a.percent - b.percent);

    results.forEach((item) => {
        if(item.percent === 0) {
            resultHTML += `
            <div class="result-item" style="border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 4px 20px rgba(16, 185, 129, 0.1);">
                <div class="result-header">
                    <span style="color: white; font-size: 16px;"><i class="fa-solid fa-crown" style="color: #fbbf24;"></i> ${item.name}</span>
                    <span class="best-badge">คุ้มค่าที่สุด!</span>
                </div>
                <div style="font-size: 13px; color: var(--text-muted);">ราคาต่อหน่วย: ฿${item.unitPrice.toFixed(4)}</div>
                <div class="progress-bg"><div class="progress-bar progress-success" style="width: 100%;"></div></div>
            </div>`;
        } else {
            let barWidth = Math.min(item.percent, 100); 
            resultHTML += `
            <div class="result-item">
                <div class="result-header">
                    <span>${item.name}</span>
                    <span style="color: var(--danger); font-size: 14px;">แพงกว่า ${item.percent.toFixed(2)}%</span>
                </div>
                <div style="font-size: 13px; color: var(--text-muted);">ราคาต่อหน่วย: ฿${item.unitPrice.toFixed(4)}</div>
                <div class="progress-bg"><div class="progress-bar progress-danger" style="width: ${barWidth}%;"></div></div>
            </div>`;
        }
    });
    
    document.getElementById("result").innerHTML = resultHTML;
    document.getElementById("result").scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>

</body>
</html>
